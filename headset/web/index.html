<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sauron's Eye — Headset Viewer</title>
  <style>
    body { margin: 0; background: #0d1117; color: #e6edf3;
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           overflow: hidden; }
    #ui { position: absolute; inset: 0; display: flex; flex-direction: column;
          align-items: center; justify-content: center; gap: 14px; z-index: 100; }
    h1 { font-size: 28px; margin: 0 0 6px; }
    #status { font-size: 16px; color: #8b949e; }
    #count  { font-size: 14px; color: #8b949e; }
    button { padding: 16px 36px; font-size: 18px; font-weight: 600;
             color: #fff; background: #238636; border: none; border-radius: 10px;
             cursor: pointer; }
    button:disabled { background: #444; cursor: not-allowed; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="ui">
    <h1>Sauron's Eye — Headset Viewer</h1>
    <div id="status">Initialising…</div>
    <div id="count"></div>
    <button id="enterBtn" disabled>Enter AR</button>
  </div>

  <script type="importmap">
  { "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';

    const statusEl = document.getElementById('status');
    const countEl  = document.getElementById('count');
    const enterBtn = document.getElementById('enterBtn');
    const ui       = document.getElementById('ui');
    const setStatus = (m) => { statusEl.textContent = m; };

    // ---------- three.js ----------
    const scene     = new THREE.Scene();
    // Two roots:
    //   worldRoot — items already in WebXR local-floor frame (frame="world")
    //   headRoot  — items in three.js camera-local frame (frame="camera").
    //               Its matrix is set once per scene message to the *current*
    //               XR camera pose, freezing those items where the headset was
    //               at scene-receive time. Subsequent head motion does not move
    //               them, so silhouettes stay world-locked.
    const worldRoot = new THREE.Group();
    const headRoot  = new THREE.Group();
    headRoot.matrixAutoUpdate = false;
    scene.add(worldRoot);
    scene.add(headRoot);

    const camera   = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x000000, 0);     // transparent so AR passthrough shows through
    renderer.xr.enabled = true;
    renderer.xr.setReferenceSpaceType('local-floor');
    document.body.appendChild(renderer.domElement);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ---------- WS: receive scene, rebuild wireframes ----------
    function clearScene() {
      for (const g of [worldRoot, headRoot]) {
        while (g.children.length) {
          const obj = g.children.pop();
          obj.geometry?.dispose?.();
          obj.material?.dispose?.();
        }
      }
    }

    function rootFor(frame) {
      return frame === 'camera' ? headRoot : worldRoot;
    }

    // Triangulate a coplanar 3D polygon into a clean mesh.
    //   1. centroid
    //   2. v1 = first edge from centroid (normalised)
    //   3. v2 = some other edge that isn't collinear with v1
    //   4. plane normal = v1 × v2; orthonormalise v2 = normal × v1
    //   5. project each polygon vertex to (u, v) in this basis
    //   6. THREE.ShapeGeometry triangulates the 2D polygon (earcut)
    //   7. lift each output vertex back: P = centroid + u·v1 + v·v2
    function planarFillMesh(pts, colorInt, opacity = 0.5) {
      if (pts.length < 3) return null;
      let cx = 0, cy = 0, cz = 0;
      for (const p of pts) { cx += p[0]; cy += p[1]; cz += p[2]; }
      cx /= pts.length; cy /= pts.length; cz /= pts.length;

      const v1 = new THREE.Vector3(pts[0][0]-cx, pts[0][1]-cy, pts[0][2]-cz);
      if (v1.length() < 1e-6) return null;
      v1.normalize();

      let v2tmp = null;
      for (let i = 1; i < pts.length; i++) {
        const cand = new THREE.Vector3(pts[i][0]-cx, pts[i][1]-cy, pts[i][2]-cz);
        if (cand.length() < 1e-6) continue;
        // accept if not nearly parallel to v1
        if (Math.abs(cand.dot(v1)) < 0.99 * cand.length()) {
          v2tmp = cand;
          break;
        }
      }
      if (!v2tmp) return null;

      const normal = new THREE.Vector3().crossVectors(v1, v2tmp).normalize();
      const v2 = new THREE.Vector3().crossVectors(normal, v1).normalize();

      const shape = new THREE.Shape();
      for (let i = 0; i < pts.length; i++) {
        const d = new THREE.Vector3(pts[i][0]-cx, pts[i][1]-cy, pts[i][2]-cz);
        const u = d.dot(v1);
        const v = d.dot(v2);
        if (i === 0) shape.moveTo(u, v);
        else shape.lineTo(u, v);
      }
      shape.closePath();

      const geom = new THREE.ShapeGeometry(shape);
      const positions = geom.attributes.position;
      for (let i = 0; i < positions.count; i++) {
        const u = positions.getX(i);
        const v = positions.getY(i);
        positions.setXYZ(
          i,
          cx + u * v1.x + v * v2.x,
          cy + u * v1.y + v * v2.y,
          cz + u * v1.z + v * v2.z,
        );
      }
      positions.needsUpdate = true;
      geom.computeBoundingSphere();

      const mat = new THREE.MeshBasicMaterial({
        color: colorInt,
        transparent: true,
        opacity: opacity,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      return new THREE.Mesh(geom, mat);
    }

    function applyScene(msg) {
      if (msg?.type !== 'scene') return;
      clearScene();

      // Snapshot the live XR camera pose so frame=="camera" items get pinned to
      // where the headset was at this moment. Without an active XR session the
      // matrix stays identity, which is the correct fallback (camera == world).
      const xrCam = renderer.xr.getCamera();
      headRoot.matrix.copy(xrCam.matrixWorld);

      const cubes = msg.cubes || [];
      for (const c of cubes) {
        const [sx, sy, sz] = c.size;
        const box   = new THREE.BoxGeometry(sx, sy, sz);
        const edges = new THREE.EdgesGeometry(box);
        box.dispose();
        const mat   = new THREE.LineBasicMaterial({ color: c.color ?? 0x00ff88 });
        const lines = new THREE.LineSegments(edges, mat);
        lines.position.set(c.center[0], c.center[1], c.center[2]);
        const [qx, qy, qz, qw] = c.quat;
        lines.quaternion.set(qx, qy, qz, qw);
        rootFor(c.frame).add(lines);
      }

      const pointClouds = msg.point_clouds || [];
      for (const pc of pointClouds) {
        const pts = pc.points || [];
        if (pts.length === 0) continue;
        const flat = new Float32Array(pts.length * 3);
        for (let i = 0; i < pts.length; i++) {
          flat[3*i] = pts[i][0]; flat[3*i+1] = pts[i][1]; flat[3*i+2] = pts[i][2];
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.BufferAttribute(flat, 3));
        const mat = new THREE.PointsMaterial({
          color: pc.color ?? 0x00ff88,
          size: pc.size ?? 0.04,
          sizeAttenuation: true,
          transparent: true,
          opacity: 0.9,
          depthWrite: false,
        });
        rootFor(pc.frame).add(new THREE.Points(geom, mat));
      }

      const polylines = msg.polylines || [];
      for (const pl of polylines) {
        const pts = pl.points || [];
        if (pts.length < 2) continue;

        // Outline: closed loop or open line.
        const flat = new Float32Array(pts.length * 3);
        for (let i = 0; i < pts.length; i++) {
          flat[3*i] = pts[i][0]; flat[3*i+1] = pts[i][1]; flat[3*i+2] = pts[i][2];
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.BufferAttribute(flat, 3));
        const lineMat = new THREE.LineBasicMaterial({ color: pl.color ?? 0x00ff88 });
        const lineObj = pl.closed ? new THREE.LineLoop(geom, lineMat)
                                  : new THREE.Line(geom, lineMat);
        rootFor(pl.frame).add(lineObj);

        // Fill: project the (coplanar) 3D polygon to its plane, triangulate
        // via THREE.ShapeGeometry (earcut under the hood — handles concave),
        // then lift the resulting vertices back into 3D. No visible seams.
        if (pl.fill_color != null && pts.length >= 3) {
          const mesh = planarFillMesh(pts, pl.fill_color);
          if (mesh) rootFor(pl.frame).add(mesh);
        }
      }

      const ptsTotal = pointClouds.reduce((acc, pc) => acc + (pc.points?.length || 0), 0);
      countEl.textContent = `${cubes.length} cubes / ${polylines.length} silhouettes / ${ptsTotal} pts`;
    }

    let ws = null;
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen    = () => setStatus('Connected. Tap Enter AR.');
      ws.onmessage = (e) => {
        try { applyScene(JSON.parse(e.data)); }
        catch (err) { console.error('bad scene message', err); }
      };
      ws.onclose = () => { setStatus('Disconnected — retrying…'); setTimeout(connectWS, 1000); };
      ws.onerror = () => setStatus('WebSocket error');
    }
    connectWS();

    // ---------- WebXR session ----------
    async function enterAR() {
      if (!navigator.xr) { setStatus('WebXR not available'); return; }
      let session;
      try {
        session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local-floor'],
        });
      } catch {
        session = await navigator.xr.requestSession('immersive-vr', {
          requiredFeatures: ['local-floor'],
        });
      }
      await renderer.xr.setSession(session);
      ui.classList.add('hidden');
      session.addEventListener('end', () => ui.classList.remove('hidden'));
    }
    enterBtn.addEventListener('click', () => {
      enterAR().catch((e) => setStatus('AR failed: ' + e.message));
    });

    (async () => {
      if (!navigator.xr) { setStatus('No WebXR — open this page in the Quest browser'); return; }
      const ar = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
      const vr = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
      if (!ar && !vr) { setStatus('AR/VR not supported on this device'); return; }
      setStatus(ar ? 'AR ready' : 'VR ready (no passthrough)');
      enterBtn.disabled = false;
    })();

    // ---------- render loop ----------
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
  </script>
</body>
</html>
